name: TG Diag
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose bot identity and chat updates
        run: |
          echo "=== 1) getMe (secret 토큰의 봇 식별) ==="
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getMe" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result',{}); print('ok=',d.get('ok'),'| username=@'+str(r.get('username')),'| first_name=',r.get('first_name'))"
          echo "=== 2) getUpdates (방금 /start 한 chat 목록) ==="
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/getUpdates" \
            | python3 -c "
import sys,json
d=json.load(sys.stdin)
res=d.get('result',[])
print('updates:',len(res))
seen=set()
for u in res:
    m=u.get('message') or u.get('edited_message') or {}
    c=m.get('chat',{})
    key=c.get('id')
    if key and key not in seen:
        seen.add(key)
        print('  chat_id=',c.get('id'),'| type=',c.get('type'),'| name=',c.get('first_name') or c.get('title'))
if not res:
    print('  (비어 있음 — bot.yml 폴링이 이미 소비했거나, /start 한 봇이 다름)')
"
          echo "=== 3) 현재 secret chat_id 로 직접 발송 시도 ==="
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=🔧 chat 진단" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('ok=',d.get('ok'),'| message_id=',d.get('result',{}).get('message_id'),'| error=',d.get('description'))"
