name: Daily Status
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip if captured
        id: check
        run: |
          if [ -f .a1_captured ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Count attempts
        if: steps.check.outputs.skip != 'true'
        id: count
        run: |
          TOTAL=$(gh run list --workflow=launch.yml --json conclusion,createdAt --limit 200 \
            | jq '[.[] | select((now - (.createdAt | fromdate)) < 86400)] | length')
          LAST=$(gh run list --workflow=launch.yml --json createdAt --limit 1 | jq -r '.[0].createdAt')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "last=$LAST" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Telegram daily
        if: steps.check.outputs.skip != 'true'
        run: |
          MSG="⏳ A1.Flex 4/24 hunting%0A%0ALast 24h attempts: ${{ steps.count.outputs.total }}%0ALatest run: ${{ steps.count.outputs.last }}%0A%0AStill trying..."
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG"
