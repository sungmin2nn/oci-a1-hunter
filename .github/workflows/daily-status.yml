name: Daily Status
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Skip if captured
        id: check
        run: |
          if [ -f .a1_captured ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          fi
          if [ -f .a1_blocked ]; then
            echo "blocked=true" >> $GITHUB_OUTPUT
            echo "since=$(cat .a1_blocked)" >> $GITHUB_OUTPUT
          fi

      - name: Count attempts
        if: steps.check.outputs.skip != 'true'
        id: count
        run: |
          RUNS=$(gh run list --workflow=launch.yml --json conclusion,createdAt --limit 500 \
            | jq '[.[] | select((now - (.createdAt | fromdate)) < 86400)]')
          TOTAL=$(echo "$RUNS" | jq 'length')
          SUCCESS=$(echo "$RUNS" | jq '[.[] | select(.conclusion=="success")] | length')
          FAILURE=$(echo "$RUNS" | jq '[.[] | select(.conclusion=="failure")] | length')
          LAST=$(echo "$RUNS" | jq -r '.[0].createdAt // "none"')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "failure=$FAILURE" >> $GITHUB_OUTPUT
          echo "last=$LAST" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Telegram daily
        if: steps.check.outputs.skip != 'true'
        env:
          HUNT_START_DATE: "2026-05-10"
          REGION_LABEL: "ap-chuncheon-1"
          BURST_COUNT: "30"
        run: |
          T=${{ steps.count.outputs.total }}
          S=${{ steps.count.outputs.success }}
          F=${{ steps.count.outputs.failure }}
          LAST="${{ steps.count.outputs.last }}"
          DAYS=$(( ($(date -u +%s) - $(date -u -d "$HUNT_START_DATE" +%s)) / 86400 ))
          ATTEMPTS=$((T * BURST_COUNT))
          ATTEMPTS_FMT=$(LC_NUMERIC=en_US.UTF-8 printf "%'d" $ATTEMPTS 2>/dev/null || echo $ATTEMPTS)
          TODAY_MD=$(TZ='Asia/Seoul' date '+%m-%d')
          if [ -n "$LAST" ] && [ "$LAST" != "none" ]; then
            LAST_KST=$(TZ='Asia/Seoul' date -d "$LAST" '+%Y-%m-%d %H:%M')
          else
            LAST_KST="없음"
          fi
          SEP="━━━━━━━━━━━━━━━"
          CMDS="🤖 OCI 코멘트 ( 응답 5~15분 지연 )%0A/oci_help - 이 도움말%0A/oci_status - 현재 상태 %2B 최근 50회 통계 (capacity 없음/에러)%0A/oci_last - 최근 5번 실행 결과%0A/oci_log - 마지막 에러 로그 요약%0A/oci_run - 즉시 1회 launch 수동 트리거"
          if [ "${{ steps.check.outputs.blocked }}" = "true" ]; then
            ICON="⏸️"
            BODY="📅 ${HUNT_START_DATE} ~ / D%2B${DAYS}%0A⏸️ A1 limit=0 (Oracle 회수) — 사냥 일시중단%0A~2시간마다 limit 재확인 · 복구 시 자동 재개%0A🎯 ${REGION_LABEL} · A1.Flex 2/12%0A🚫 차단감지 ${{ steps.check.outputs.since }}"
          elif [ "$T" = "0" ]; then
            ICON="⚠️"
            BODY="📅 ${HUNT_START_DATE} ~ / D%2B${DAYS}%0A🔄 24시간 실행 0건 — 스케줄 멈춤 의심 (cron-job.org 확인)%0A🎯 ${REGION_LABEL} · A1.Flex 2/12%0A⏳ 최근 없음"
          elif [ "$F" -gt "0" ] && [ "$S" = "0" ]; then
            ICON="🚨"
            BODY="📅 ${HUNT_START_DATE} ~ / D%2B${DAYS}%0A🔄 ${T}회 실행 / 약 ${ATTEMPTS_FMT}회 시도 · 에러 ${F}%0A🚨 전부 에러 — secrets / permissions 확인 필요%0A🎯 ${REGION_LABEL} · A1.Flex 2/12%0A⏳ 최근 ${LAST_KST} KST"
          else
            ICON="♨️"
            BODY="📅 ${HUNT_START_DATE} ~ / D%2B${DAYS}%0A🔄 ${T}회 실행 / 약 ${ATTEMPTS_FMT}회 시도 · 에러 ${F}%0A🎯 ${REGION_LABEL} · A1.Flex 2/12%0A⏳ 최근 ${LAST_KST} KST"
          fi
          MSG="🤖 A1 사냥 현황 - ${TODAY_MD} [${ICON}]%0A${BODY}"
          # 명령어 안내는 15일에 한 번만 (D+0, D+15, D+30 ...)
          if [ $((DAYS % 15)) -eq 0 ]; then
            MSG="${MSG}%0A${SEP}%0A${CMDS}%0A${SEP}"
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG"

      - name: Telegram on captured note
        if: steps.check.outputs.skip == 'true'
        run: |
          echo "Already captured. No daily summary needed."
