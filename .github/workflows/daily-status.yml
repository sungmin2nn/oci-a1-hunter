name: Daily Status
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Skip if captured
        id: check
        run: |
          if [ -f .a1_captured ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Count attempts
        if: steps.check.outputs.skip != 'true'
        id: count
        run: |
          RUNS=$(gh run list --workflow=launch.yml --json conclusion,createdAt --limit 500 \
            | jq '[.[] | select((now - (.createdAt | fromdate)) < 86400)]')
          TOTAL=$(echo "$RUNS" | jq 'length')
          SUCCESS=$(echo "$RUNS" | jq '[.[] | select(.conclusion=="success")] | length')
          FAILURE=$(echo "$RUNS" | jq '[.[] | select(.conclusion=="failure")] | length')
          LAST=$(echo "$RUNS" | jq -r '.[0].createdAt // "none"')
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "failure=$FAILURE" >> $GITHUB_OUTPUT
          echo "last=$LAST" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Telegram daily
        if: steps.check.outputs.skip != 'true'
        env:
          HUNT_START_DATE: "2026-05-10"
          REGION_LABEL: "ap-chuncheon-1"
          BURST_COUNT: "50"
        run: |
          T=${{ steps.count.outputs.total }}
          S=${{ steps.count.outputs.success }}
          F=${{ steps.count.outputs.failure }}
          LAST="${{ steps.count.outputs.last }}"
          DAYS=$(( ($(date -u +%s) - $(date -u -d "$HUNT_START_DATE" +%s)) / 86400 ))
          ATTEMPTS=$((T * BURST_COUNT))
          ATTEMPTS_FMT=$(LC_NUMERIC=en_US.UTF-8 printf "%'d" $ATTEMPTS 2>/dev/null || echo $ATTEMPTS)
          NOW_KST=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M')
          if [ -n "$LAST" ] && [ "$LAST" != "none" ]; then
            LAST_KST=$(TZ='Asia/Seoul' date -d "$LAST" '+%Y-%m-%d %H:%M')
          else
            LAST_KST="없음"
          fi
          BASE="📅 사냥 ${DAYS}일째 (시작 ${HUNT_START_DATE})%0A🕒 현재: ${NOW_KST} KST%0A🎯 ${REGION_LABEL} · A1.Flex 4 OCPU / 24 GB"
          if [ "$T" = "0" ]; then
            HEADER="⚠️ ⚠️ ⚠️ A1 사냥 — 24시간 실행 0건"
            STATS="📊 최근 24시간%0A  실행 횟수: 0회%0A  ⚠️ 스케줄이 멈췄을 가능성 — cron-job.org 확인 필요"
            TAIL="마지막 시도 없음"
          elif [ "$F" -gt "0" ] && [ "$S" = "0" ]; then
            HEADER="🚨 🚨 🚨 A1 사냥 — 전부 실패"
            STATS="📊 최근 24시간%0A  실행 횟수: ${T}회%0A  시도 횟수: 약 ${ATTEMPTS_FMT}회%0A  성공 ${S} · 실패 ${F}%0A  🚨 secrets / permissions 확인 필요"
            TAIL="🔄 마지막 시도: ${LAST_KST} KST"
          else
            HEADER="⏳ ⏳ ⏳ A1 사냥 현황"
            STATS="📊 최근 24시간%0A  실행 횟수: ${T}회%0A  시도 횟수: 약 ${ATTEMPTS_FMT}회%0A  성공 ${S} · 실패 ${F}"
            TAIL="🔄 마지막 시도: ${LAST_KST} KST%0A%0A계속 사냥 중..."
          fi
          MSG="${HEADER}%0A%0A${BASE}%0A%0A${STATS}%0A%0A${TAIL}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG"

      - name: Telegram on captured note
        if: steps.check.outputs.skip == 'true'
        run: |
          echo "Already captured. No daily summary needed."
