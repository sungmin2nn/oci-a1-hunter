name: Telegram Bot
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Poll and respond
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          AUTH_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          UPDATES=$(curl -s "https://api.telegram.org/bot$TG_TOKEN/getUpdates?timeout=0&limit=100")
          COUNT=$(echo "$UPDATES" | jq '.result | length')
          if [ "$COUNT" = "0" ]; then
            echo "No new messages"
            exit 0
          fi
          echo "Processing $COUNT updates"
          MAX_ID=0
          for i in $(seq 0 $((COUNT-1))); do
            UPDATE=$(echo "$UPDATES" | jq ".result[$i]")
            UPD_ID=$(echo "$UPDATE" | jq -r '.update_id')
            CHAT_ID=$(echo "$UPDATE" | jq -r '.message.chat.id // empty')
            TEXT=$(echo "$UPDATE" | jq -r '.message.text // empty')
            if [ "$UPD_ID" -gt "$MAX_ID" ]; then MAX_ID=$UPD_ID; fi
            if [ -z "$CHAT_ID" ] || [ -z "$TEXT" ]; then continue; fi
            if [ "$CHAT_ID" != "$AUTH_CHAT_ID" ]; then
              echo "Ignoring unauthorized chat: $CHAT_ID"
              continue
            fi
            CMD=$(echo "$TEXT" | awk '{print tolower($1)}')
            REPLY=""
            case "$CMD" in
              /oci_status)
                if [ -f .a1_captured ]; then
                  REPLY=$'\xe2\x9c\x85 Already captured.\nWorkflow disabled.'
                else
                  RUNS=$(gh run list --workflow=launch.yml --json conclusion,createdAt --limit 50)
                  TOTAL=$(echo "$RUNS" | jq 'length')
                  S=$(echo "$RUNS" | jq '[.[] | select(.conclusion=="success")] | length')
                  F=$(echo "$RUNS" | jq '[.[] | select(.conclusion=="failure")] | length')
                  LAST=$(echo "$RUNS" | jq -r '.[0].createdAt // "none"')
                  WF_STATE=$(gh workflow view launch.yml --json state --jq '.state' 2>/dev/null || echo "unknown")
                  TIMES=$(echo "$RUNS" | jq -r '.[].createdAt' | sort)
                  FIRST_T=$(echo "$TIMES" | head -1)
                  LAST_T=$(echo "$TIMES" | tail -1)
                  if [ -n "$FIRST_T" ] && [ "$TOTAL" -gt "1" ]; then
                    FE=$(date -d "$FIRST_T" +%s)
                    LE=$(date -d "$LAST_T" +%s)
                    SPAN_H=$(awk -v s="$((LE-FE))" 'BEGIN{printf "%.1f", s/3600}')
                    AVG_MIN=$(((LE-FE)/60/(TOTAL-1)))
                    PER_HOUR=$(awk -v t="$TOTAL" -v h="$SPAN_H" 'BEGIN{if(h>0)printf "%.2f", t/h; else print "n/a"}')
                    FREQ_STR=$(printf 'Avg interval: %s min (%s/hr over %sh)' "$AVG_MIN" "$PER_HOUR" "$SPAN_H")
                  else
                    FREQ_STR="Avg interval: n/a"
                  fi
                  REPLY=$(printf '%s A1 Hunter Status\n\nWorkflow: %s\nRecent %s runs: %s ok / %s fail\n%s\nLast: %s\nStill hunting...' "📊" "$WF_STATE" "$TOTAL" "$S" "$F" "$FREQ_STR" "$LAST")
                fi
                ;;
              /oci_last)
                LIST=$(gh run list --workflow=launch.yml --json conclusion,createdAt --limit 5 | jq -r '.[] | "\(.createdAt | split("T")[0]) \(.createdAt | split("T")[1] | split(".")[0]) | \(.conclusion // "running")"')
                REPLY=$(printf '%s Recent 5 launches (UTC):\n\n%s' "🕒" "$LIST")
                ;;
              /oci_log)
                LAST_FAIL=$(gh run list --workflow=launch.yml --json databaseId,conclusion --limit 50 | jq -r '[.[] | select(.conclusion=="failure")] | .[0].databaseId // empty')
                if [ -z "$LAST_FAIL" ]; then
                  REPLY=$'\xe2\x9c\x85 No failures in last 50 runs.'
                else
                  ERR=$(gh run view "$LAST_FAIL" --log-failed 2>&1 | grep -iE "error|fail|exception|capacity" | tail -5 | sed 's/^[^Z]*Z //' | cut -c1-200)
                  REPLY=$(printf '%s Last failure (run %s):\n\n%s\n\nFull: https://github.com/%s/actions/runs/%s' "📜" "$LAST_FAIL" "$ERR" "$REPO" "$LAST_FAIL")
                fi
                ;;
              /oci_run)
                if [ -f .a1_captured ]; then
                  REPLY=$'\xe2\x9c\x85 Already captured. Hunting workflow is disabled.'
                else
                  RESULT=$(gh workflow run launch.yml 2>&1)
                  if [ $? -eq 0 ]; then
                    REPLY=$(printf '%s Manually triggered A1 Launch\n\nCheck: https://github.com/%s/actions/workflows/launch.yml' "🚀" "$REPO")
                  else
                    REPLY=$(printf '%s Trigger failed:\n%s' "❌" "$RESULT")
                  fi
                fi
                ;;
              /oci_help)
                REPLY=$(printf '%s OCI A1 Hunter Commands:\n\n/oci_status - 현재 상태 + 최근 50회 통계\n/oci_last - 최근 5번 실행 결과\n/oci_log - 마지막 실패 로그 요약\n/oci_run - 즉시 1회 launch 수동 트리거\n/oci_help - 이 도움말\n\n(응답 지연 5~15분, GitHub Actions 폴링 주기)' "🤖")
                ;;
              *)
                # Non-oci_* commands: silent (other bots may handle)
                echo "Ignoring non-oci command: $CMD"
                ;;
            esac
            if [ -n "$REPLY" ]; then
              curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" --data-urlencode "chat_id=$CHAT_ID" --data-urlencode "text=$REPLY" > /dev/null
              echo "Replied to $CMD"
            fi
          done
          if [ "$MAX_ID" -gt "0" ]; then
            curl -s "https://api.telegram.org/bot$TG_TOKEN/getUpdates?offset=$((MAX_ID+1))&timeout=0&limit=1" > /dev/null
            echo "Acked up to update_id $MAX_ID"
          fi
